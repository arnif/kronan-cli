name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            artifact: kronan-linux-x64
          - os: ubuntu-latest
            target: bun-linux-arm64
            artifact: kronan-linux-arm64
          - os: macos-latest
            target: bun-darwin-arm64
            artifact: kronan-darwin-arm64
          - os: macos-latest
            target: bun-darwin-x64
            artifact: kronan-darwin-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Build binary
        run: bun build src/index.ts --compile --target=${{ matrix.target }} --outfile ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          TAG="v${VERSION}-${SHORT_SHA}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Move binaries out of artifact subdirectories
          mkdir -p release
          for dir in artifacts/kronan-*; do
            name=$(basename "$dir")
            cp "$dir/$name" "release/$name"
            chmod +x "release/$name"
          done

          # Delete existing tag if it exists (for re-runs)
          gh release delete "${{ steps.version.outputs.tag }}" --yes 2>/dev/null || true
          git push origin ":refs/tags/${{ steps.version.outputs.tag }}" 2>/dev/null || true

          # Create release
          gh release create "${{ steps.version.outputs.tag }}" \
            release/kronan-* \
            --title "kronan-cli ${{ steps.version.outputs.tag }}" \
            --notes "Automated release from commit ${{ github.sha }}" \
            --latest
